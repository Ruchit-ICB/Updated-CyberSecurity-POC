services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflow_backend
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/uploads
    environment:
      - UPLOAD_DIR=/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  upload_data:
